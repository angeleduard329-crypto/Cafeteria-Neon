<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafetería Neon ULTRA PRO</title>

<style>
:root{--bg:#0a001a;--card:rgba(255,255,255,0.08);--text:white;--neon1:#ff00ff;--neon2:#00ffff;--neon3:#00ff88}
body.light{--bg:#f5f5f5;--card:rgba(255,255,255,0.7);--text:black}
body{margin:0;font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);transition:0.5s}
.container{max-width:1100px;margin:auto;padding:20px}
h1{text-align:center;color:var(--neon1);text-shadow:0 0 10px var(--neon1),0 0 20px var(--neon1)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}

.card{background:var(--card);backdrop-filter:blur(15px);border-radius:20px;padding:15px;cursor:pointer;transition:0.3s;box-shadow:0 0 10px var(--neon1)}
.card:hover{transform:scale(1.03);box-shadow:0 0 20px var(--neon2),0 0 30px var(--neon1)}
.card img{width:100%;border-radius:15px}

.cart{position:fixed;right:10px;bottom:10px;background:var(--card);backdrop-filter:blur(15px);padding:15px;border-radius:15px;width:260px;box-shadow:0 0 15px var(--neon3)}
button{width:100%;margin-top:5px;padding:8px;border:none;border-radius:10px;background:linear-gradient(45deg,var(--neon1),var(--neon2));color:white;cursor:pointer;box-shadow:0 0 10px var(--neon2)}

.toggle{position:fixed;top:10px;right:10px;background:#111;color:white;padding:10px;border-radius:10px;cursor:pointer;box-shadow:0 0 10px var(--neon1)}

/* TICKET */
.ticket{background:white;color:black;padding:15px;border-radius:10px;margin-top:10px;font-family:monospace}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}
.modal-content{background:white;color:black;padding:20px;border-radius:15px;width:300px;text-align:center}
.modal input{width:90%;padding:10px;margin-top:10px}


/* BORDE NEON ANIMADO */
.card{
 position:relative;
 overflow:hidden;
}
.card::before{
 content:"";
 position:absolute;
 inset:-2px;
 background:linear-gradient(120deg,var(--neon1),var(--neon2),var(--neon3),var(--neon1));
 background-size:300% 300%;
 animation:borderMove 4s linear infinite;
 z-index:-1;
 filter:blur(10px);
}

@keyframes borderMove{
 0%{background-position:0% 50%}
 50%{background-position:100% 50%}
 100%{background-position:0% 50%}
}

/* PARTÍCULAS */
body::after{
 content:"";
 position:fixed;
 width:100%;
 height:100%;
 background:radial-gradient(circle,rgba(255,0,255,0.2) 1px,transparent 1px);
 background-size:40px 40px;
 animation:particlesMove 20s linear infinite;
 pointer-events:none;
}

@keyframes particlesMove{
 from{transform:translateY(0)}
 to{transform:translateY(-100px)}
}

/* CURSOR NEON */
body{
 cursor:none;
}

.cursor{
 position:fixed;
 width:15px;
 height:15px;
 border-radius:50%;
 background:var(--neon2);
 box-shadow:0 0 15px var(--neon2),0 0 30px var(--neon1);
 pointer-events:none;
 transform:translate(-50%,-50%);
 z-index:9999;
}

</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">🌙 / ☀️</div>

<div class="container">
<h1>MENÚ</h1>

<div class="grid">
<div class="card" onclick="add('Café',30)"><img src="cafe-americano.jpg"><h3>Café</h3></div>
<div class="card" onclick="add('Capuchino',50)"><img src="capuchino.jpg"><h3>Capuchino</h3></div>
<div class="card" onclick="add('Latte',50)"><img src="latte.jpg"><h3>Latte</h3></div>
<div class="card" onclick="add('Chocomilk',45)"><img src="chocomilk.jpg"><h3>Chocomilk</h3></div>
<div class="card" onclick="add('Fresa',50)"><img src="fresa.jpg"><h3>Licuado fresa</h3></div>
<div class="card" onclick="add('Flan',60)"><img src="flan.jpg"><h3>Flan</h3></div>
<div class="card" onclick="add('Pan',25)"><img src="pan.jpg"><h3>Pan</h3></div>
<div class="card" onclick="add('Galletas',20)"><img src="galletas.jpg"><h3>Galletas</h3></div>
<div class="card" onclick="add('Maruchan',35)"><img src="maruchan.jpg"><h3>Maruchan</h3></div>
</div>

</div>

<div class="cart">
<h3>🛒 Carrito</h3>
<ul id="cart"></ul>
<p>Total: $<span id="total">0</span></p>
<button onclick="clearCart()">🗑 Vaciar</button>
<button onclick="openModal()">📲 Ordenar</button>

<div class="ticket" id="ticket"></div>
</div>

<!-- MODAL NOMBRE -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>Tu nombre</h3>
<input type="text" id="name" placeholder="Ej: Juan">
<button onclick="sendWhatsApp()">Enviar pedido</button>
</div>
</div>

<script>
let cart={};

function add(name,price){
 if(!cart[name])cart[name]={price,qty:1};
 else cart[name].qty++;
 render();
}

function render(){
 let c=document.getElementById("cart");
 let ticket=document.getElementById("ticket");
 c.innerHTML="";
 ticket.innerHTML="";
 let total=0;

 let t="🧾 TICKET\n------------------\n";

 for(let i in cart){
  let item=cart[i];
  let sub=item.price*item.qty;
  total+=sub;

  let li=document.createElement("li");
  li.textContent=i+" x"+item.qty;
  c.appendChild(li);

  t+=`${i} x${item.qty} = $${sub}\n`;
 }

 t+="------------------\nTotal: $"+total;
 ticket.innerText=t;

 document.getElementById("total").innerText=total;
}

function clearCart(){cart={};render()}

function openModal(){document.getElementById("modal").style.display="flex"}

function sendWhatsApp(){
 let name=document.getElementById("name").value||"Cliente";
 let text=`Hola soy ${name} quiero ordenar:%0A`;
 let total=0;

 for(let i in cart){
  let item=cart[i];
  let sub=item.price*item.qty;
  total+=sub;
  text+=`- ${i} x${item.qty} = $${sub}%0A`;
 }

 text+=`Total: $${total}`;

 window.open(`https://wa.me/529611907946?text=${text}`);
 document.getElementById("modal").style.display="none";
}

function toggleMode(){document.body.classList.toggle("light")}
</script>

<div class="cursor" id="cursor"></div>

<script>
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
 cursor.style.left=e.clientX+"px";
 cursor.style.top=e.clientY+"px";
});
</script>

</body>
</html>
